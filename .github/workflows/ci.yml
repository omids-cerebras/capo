name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-and-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install package + dev dependencies
        run: |
          python -m pip install --upgrade pip
          # Installs CAPO plus [dev] extra, which includes pytest, mkdocs, etc.
          python -m pip install ".[dev]"

      - name: Run tests
        run: pytest

      - name: Build docs (MkDocs)
        run: mkdocs build --strict
