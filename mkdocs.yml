site_name: CAPO
site_description: "Covariance-Aware Policy Optimization for RLVR"
site_url: "https://omids.github.io/capo/"

repo_url: "https://github.com/omids/capo"
repo_name: "omids/capo"

docs_dir: docs

nav:
  - Home: index.md
  - Method:
      - Setup & Notation: setup.md
      - CAPO Method: method.md
      - Algorithms: algorithms.md
      - Evaluations: evaluations.md
  - API Reference: api.md
  - Experiments: experiments.md

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
  features:
    - navigation.tabs
    - navigation.sections
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: true
            docstring_style: numpy
  - mkdocs-jupyter:
      include_source: true

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.arithmatex:
      generic: true
  - toc:
      permalink: true
  - footnotes
  - tables

extra_javascript:
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js